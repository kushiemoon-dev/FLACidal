name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME:-dev}" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install MinGW (CGO for go-sqlite3)
        run: choco install mingw -y

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        env:
          CGO_ENABLED: '1'
          CC: gcc
        run: wails build -platform windows/amd64

      - name: Compress with UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          files: build/bin/flacidal.exe
          args: --best

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flacidal-windows
          path: build/bin/flacidal.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME:-dev}" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        env:
          CGO_ENABLED: '1'
        run: wails build -platform darwin/universal

      - name: Create DMG
        run: |
          brew install create-dmg || true
          if command -v create-dmg &>/dev/null; then
            create-dmg \
              --volname "FLACidal" \
              --window-size 540 380 \
              --icon-size 100 \
              --app-drop-link 380 200 \
              build/bin/flacidal.dmg \
              build/bin/flacidal.app
          else
            hdiutil create \
              -volname "FLACidal" \
              -srcfolder build/bin/flacidal.app \
              -ov -format UDZO \
              build/bin/flacidal.dmg
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flacidal-macos
          path: build/bin/flacidal.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME:-dev}" >> $GITHUB_OUTPUT

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            upx \
            fuse \
            libfuse2
          # Wails v2 hardcodes webkit2gtk-4.0 in pkg-config; alias 4.1 → 4.0
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        env:
          CGO_ENABLED: '1'
        run: wails build

      - name: Compress with UPX
        run: upx --best build/bin/flacidal

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/bin/flacidal AppDir/usr/bin/flacidal
          cat > AppDir/flacidal.desktop <<'EOF'
          [Desktop Entry]
          Name=FLACidal
          Exec=flacidal
          Icon=flacidal
          Type=Application
          Categories=AudioVideo;Audio;
          EOF
          # Use a placeholder icon if none exists in the repo
          if [ -f build/appicon.png ]; then
            cp build/appicon.png AppDir/usr/share/icons/hicolor/256x256/apps/flacidal.png
            cp build/appicon.png AppDir/flacidal.png
          else
            convert -size 256x256 xc:#1a1a2e -fill white -font DejaVu-Sans -pointsize 48 \
              -gravity center -annotate 0 "F" AppDir/flacidal.png 2>/dev/null || \
              touch AppDir/flacidal.png
            cp AppDir/flacidal.png AppDir/usr/share/icons/hicolor/256x256/apps/flacidal.png
          fi
          ln -sf usr/bin/flacidal AppDir/AppRun
          ARCH=x86_64 appimagetool AppDir build/bin/flacidal.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flacidal-linux
          path: build/bin/flacidal.AppImage

  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/flacidal-windows/flacidal.exe
            artifacts/flacidal-macos/flacidal.dmg
            artifacts/flacidal-linux/flacidal.AppImage
          generate_release_notes: true
