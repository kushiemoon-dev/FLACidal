name: Test Suite

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  GO_VERSION: '1.26'

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --run

      - name: Type check
        working-directory: frontend
        run: npm run check

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint
        # continue-on-error is intentional, not a placeholder. ESLint isn't a
        # devDependency in package.json and there's no eslint.config.js, so
        # `npm run lint` currently fails with "eslint: command not found"
        # (exit 127) — confirmed by running it locally. That's not a backlog
        # of style violations to spot-fix; it's an unfinished tool setup
        # (add the eslint/svelte-eslint-parser deps + a flat config), out of
        # scope for this CI-hardening pass. Remove this flag once ESLint is
        # actually wired up.
        continue-on-error: true

  go-test:
    name: Go Test, Vet & Build
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4

      - name: Configure private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Scoped to ./internal/... and ./cmd/... — same scope as `make test-unit`/
      # `make lint`. The root package (main.go, the Wails desktop entrypoint)
      # embeds frontend/dist via go:embed and needs cgo bindings to GTK/webkit,
      # both of which only the `build` job below sets up.
      - name: go vet
        run: go vet ./internal/... ./cmd/...

      - name: go build
        run: go build ./internal/... ./cmd/...

      - name: Build headless server (cmd/server)
        run: go build -o /dev/null ./cmd/server

      - name: go test
        run: go test -race ./internal/... ./cmd/...

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4

      - name: Configure private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # golangci-lint v2 (the default `@latest`) rejects .golangci.yml outright
      # with "unsupported version of the configuration" — the file predates v2's
      # config schema and hasn't been migrated. Pinned to v1.64.8 (the last v1
      # release) instead, which builds and runs fine against Go 1.26 and the
      # existing v1-format config. Re-evaluate the pin once .golangci.yml is
      # migrated to the v2 schema (`golangci-lint migrate`).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --timeout=5m ./internal/... ./cmd/...
        # Non-blocking: 3 pre-existing findings predate this change
        # (internal/app/app.go:407, internal/app/app_converter.go:124,
        # internal/api/handlers_export.go:46 — unchecked errors / gocritic
        # %q suggestion). Left as-is to keep this diff surgical; remove
        # continue-on-error once they're cleaned up.
        continue-on-error: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [frontend-tests]
    env:
      GOPRIVATE: github.com/kushiemoon-dev/*
      GONOSUMDB: github.com/kushiemoon-dev/*
    steps:
      - uses: actions/checkout@v4

      - name: Configure private Go modules
        run: git config --global url."https://x-access-token:${{ secrets.CORE_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails build
