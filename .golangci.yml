linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - typecheck
    - unused
    - gocritic
    - revive
    - misspell

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
    disabled-checks:
      - ifElseChain
  revive:
    rules:
      - name: exported
        arguments: ["checkPrivateReceivers"]

run:
  timeout: 5m

issues:
  exclude-dirs:
    - frontend
  exclude-rules:
    - path: _test\.go
      linters:
        - gocritic
        - errcheck
